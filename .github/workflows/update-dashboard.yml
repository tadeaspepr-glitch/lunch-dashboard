name: Update lunch dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check Prague time window
        id: timecheck
        run: |
          HOUR=$(TZ='Europe/Prague' date +'%H')
          MIN=$(TZ='Europe/Prague' date +'%M')
          NOW=$((10#$HOUR * 60 + 10#$MIN))
          START=$((8 * 60 + 40))
          END=$((11 * 60 + 45))

          echo "Prague time: ${HOUR}:${MIN}"

          if [ "$NOW" -ge "$START" ] && [ "$NOW" -le "$END" ]; then
            echo "run_dashboard=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_dashboard=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.timecheck.outputs.run_dashboard == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.timecheck.outputs.run_dashboard == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.timecheck.outputs.run_dashboard == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate dashboard
        if: steps.timecheck.outputs.run_dashboard == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python lunch_dashboard_engine_v68.py --output public/index.html --no-open --no-cache --report public/debug_report.md

      - name: Upload GitHub Pages artifact
        if: steps.timecheck.outputs.run_dashboard == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.result == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
