name: Update lunch dashboard

on:
  workflow_dispatch:
  schedule:
    # GitHub cron běží v UTC.
    # Letní čas v Praze: UTC+2
    # 06:45 UTC = 08:45 Praha
    # 07:30 UTC = 09:30 Praha
    # 08:30 UTC = 10:30 Praha
    # 09:30 UTC = 11:30 Praha
    - cron: "45 6 * * 1-5"
    - cron: "30 7 * * 1-5"
    - cron: "30 8 * * 1-5"
    - cron: "30 9 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate dashboard
        run: |
          python lunch_dashboard_engine_v68.py --output public/index.html --no-open --no-cache --report public/debug_report.md

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
